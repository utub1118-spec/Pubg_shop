<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDOFF 2 | GOLD SHOP</title>
    <style>
        :root { --accent: #ff8c00; --bg: #0d0d0f; --card: rgba(26, 27, 30, 0.9); --danger: #ff4444; --success: #00c853; }
        
        body { 
            background: #000 url('https://wallpapercave.com') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden;
        }

        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: -1; }

        .header { text-align: center; padding: 25px; border-bottom: 2px solid var(--accent); background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(5px); }
        .header h1 { margin: 0; font-size: 1.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); text-shadow: 0 0 15px rgba(255,140,0,0.6); }

        .tabs { display: flex; justify-content: center; gap: 8px; margin: 20px 0; overflow-x: auto; padding: 5px; }
        .tab-btn { background: var(--card); border: 1px solid #444; color: #bbb; padding: 12px 18px; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { border-color: var(--accent); color: white; background: rgba(255, 140, 0, 0.2); }

        .container { max-width: 500px; margin: 0 auto; padding: 0 15px; }
        
        .user-input-box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; outline: none; margin-bottom: 10px; transition: 0.3s; }
        input:disabled { opacity: 0.5; border-color: var(--success); color: var(--success); }

        .services { display: none; grid-template-columns: 1fr; gap: 12px; }
        .services.active { display: grid; }
        
        .option { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; position: relative;
        }

        .price { color: var(--accent); font-weight: 800; font-size: 1.2rem; }

        .fly-item {
            position: fixed; z-index: 9999; pointer-events: none;
            background: var(--accent); width: 25px; height: 25px; border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-toggle { 
            position: fixed; top: 20px; right: 20px; background: var(--accent); color: black; 
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; cursor: pointer; z-index: 2000;
        }
        
        @keyframes shake {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(15deg); }
            100% { transform: scale(1); }
        }
        .cart-shake { animation: shake 0.4s ease-in-out; }

        #thanks-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .thanks-card { background: var(--card); padding: 40px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; }

        #cart-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; backdrop-filter: blur(8px); }
        .cart-content { max-width: 450px; margin: 60px auto; background: #1a1b1e; border-radius: 15px; padding: 25px; border: 1px solid var(--accent); }
        
        .pay-btn { width: 100%; background: var(--success); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="cart-toggle" id="main-cart" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>

<div class="header"><h1>STANDOFF 2 GOLD SHOP</h1></div>

<div class="container">
    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('gold')">Золото</div>
        <div class="tab-btn" onclick="showTab('tickets')">Билеты</div>
    </div>

    <div class="user-input-box">
        <input type="text" id="user_id" placeholder="Ваш ID игрока">
        <div style="display:flex; gap:5px;">
            <input type="text" id="promo_input" placeholder="Промокод (на 1 раз)">
            <button id="promo_btn" onclick="applyPromo()" style="height:42px; background:var(--accent); border:none; padding:0 15px; border-radius:5px; font-weight:bold; cursor:pointer;">OK</button>
        </div>
    </div>

    <div id="gold" class="services active">
        <div class="option" onclick="buyItem(this, '500 Gold', 373)">
            <div class="info"><h3>500 Gold</h3><p>Начисление по ID</p></div>
            <div class="price" data-base="373">373 ₽</div>
        </div>
        <div class="option" onclick="buyItem(this, '2000 Gold', 1368)">
            <div class="info"><h3>2000 Gold</h3><p>Выгодный пакет</p></div>
            <div class="price" data-base="1368">1368 ₽</div>
        </div>
    </div>

    <div id="tickets" class="services">
        <div class="option" onclick="buyItem(this, 'Epic Ticket', 125)">
            <div class="info"><h3>Epic Ticket</h3><p><s>250 ₽</s> Скидка 50%</p></div>
            <div class="price" data-base="125">125 ₽</div>
        </div>
    </div>
</div>

<div id="cart-modal">
    <div class="cart-content">
        <h2 style="color:var(--accent); margin-top:0;">Ваш заказ</h2>
        <div id="cart-items-list"></div>
        <div id="bonus-line" style="color:var(--success); font-size:0.8rem; margin-top:5px;"></div>
        <div style="margin-top:20px; display:flex; justify-content:space-between; font-weight:bold;">
            <span>ИТОГО:</span><span id="total-price">0 ₽</span>
        </div>
        <button class="pay-btn" onclick="processPayment()" style="margin-top:20px;">ОПЛАТИТЬ ЧЕРЕЗ ЮMONEY</button>
        <p onclick="toggleCart()" style="text-align:center; color:#666; cursor:pointer; margin-top:15px;">Вернуться к покупкам</p>
    </div>
</div>

<div id="thanks-screen" onclick="location.reload()">
    <div class="thanks-card">
        <div style="font-size: 5rem; animation: shake 1s infinite;">🎁</div>
        <h1 style="color:var(--accent);">УСПЕШНО!</h1>
        <p>Спасибо за покупку. Голда придет в течение 10 минут.</p>
        <small style="color:#666;">Нажми куда угодно, чтобы вернуться</small>
    </div>
</div>

<script>
    let cart = [];
    let currentDiscount = 1;
    let bonusGoldActive = false;
    let usedPromos = []; // Список использованных кодов

    const promoData = {
        'LUCKY10': 0.9, 'BATTLE25': 0.75, 'GIFT40': 0.6, 'PROMO15': 0.85, 'SECRET50': 0.5, 'STANDOFF20': 0.8,
        'FREE30G': 'bonus', 'GIVEAWAY': 'bonus'
    };

    function applyPromo() {
        const input = document.getElementById('promo_input');
        const code = input.value.trim().toUpperCase();

        if (usedPromos.includes(code)) {
            alert("Этот промокод уже был использован!");
            return;
        }

        if (promoData[code]) {
            if (promoData[code] === 'bonus') {
                bonusGoldActive = true;
                alert("Бонус +30 Gold активирован!");
            } else {
                currentDiscount = promoData[code];
                alert(`Промокод применен! Скидка: ${(1 - currentDiscount) * 100}%`);
                updatePrices();
            }
            usedPromos.push(code); // Помечаем как использованный
            input.disabled = true;
            document.getElementById('promo_btn').disabled = true;
            document.getElementById('promo_btn').style.background = '#333';
        } else {
            alert("Промокод не существует!");
        }
    }

    function updatePrices() {
        document.querySelectorAll('.price').forEach(p => {
            const base = p.getAttribute('data-base');
            p.innerText = Math.round(base * currentDiscount) + " ₽";
        });
    }

    function buyItem(el, name, price) {
        if(!document.getElementById('user_id').value) return alert("Сначала введите ID!");

        // Звук клика (имитация)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);

        // Анимация полета
        const rect = el.getBoundingClientRect();
        const cartRect = document.getElementById('main-cart').getBoundingClientRect();
        const fly = document.createElement('div');
        fly.className = 'fly-item';
        fly.style.left = rect.left + 'px'; fly.style.top = rect.top + 'px';
        document.body.appendChild(fly);

        setTimeout(() => {
            fly.style.left = cartRect.left + 'px';
            fly.style.top = cartRect.top + 'px';
            fly.style.transform = 'scale(0)';
        }, 50);

        setTimeout(() => {
            fly.remove();
            document.getElementById('main-cart').classList.add('cart-shake');
            setTimeout(() => document.getElementById('main-cart').classList.remove('cart-shake'), 400);
            cart.push({name, price: Math.round(price * currentDiscount)});
            document.getElementById('cart-count').innerText = cart.length;
        }, 750);
    }

    function toggleCart() {
        const m = document.getElementById('cart-modal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        render();
    }

    function render() {
        const l = document.getElementById('cart-items-list');
        l.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #222;"><span>${i.name}</span><span>${i.price} ₽</span></div>`).join('');
        const total = cart.reduce((a, b) => a + b.price, 0);
        document.getElementById('total-price').innerText = total + " ₽";
        document.getElementById('bonus-line').innerText = bonusGoldActive ? "🎁 Активирован бонус: +30 Gold" : "";
    }

    function showTab(id) {
        document.querySelectorAll('.services').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function processPayment() {
        if(cart.length === 0) return;
        const id = document.getElementById('user_id').value;
        const total = cart.reduce((a, b) => a + b.price, 0);
        const items = cart.map(i => i.name).join(', ') + (bonusGoldActive ? ' + BONUS 30G' : '');
        
        window.open(`https://yoomoney.ru{total}?comment=${encodeURIComponent("ID:"+id+" | "+items)}`, '_blank');
        
        document.getElementById('cart-modal').style.display = 'none';
        document.getElementById('thanks-screen').style.display = 'flex';
    }
</script>

</body>
    </html>
